<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ness | This Card is Wellness</title>
  <meta name="description" content="Get the wellness rewards and benefits you've always dreamed of with the first Ness Credit Card.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@1,500;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <nav class="navbar">
    <div class="nav-links left-links">
      <a href="#">Card</a>
      <a href="#">The Nessie</a>
    </div>
    <div class="logo">
      <span class="logo-text">Ness</span>
    </div>
    <div class="nav-links right-links">
      <a href="#">Sightings</a>
      <a href="#">Team</a>
    </div>
  </nav>

  <main class="hero">
    <div class="hero-content">
      <h1 class="main-title">
        <span class="this-card">This Card</span><br>
        <div class="is-wellness"><span class="is-text">is</span> <span class="wellness-text">Wellness</span></div>
      </h1>
      <p class="subtitle">
        Get the wellness rewards and benefits you've always<br>
        dreamed of with the first Ness Credit Card.<sup>†</sup>
      </p>
    </div>

    <div class="card-container">
      <div class="card">
        <div class="card-glow"></div>
        <div class="card-chip"></div>
        <div class="card-contactless">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8.5 21.6C9.5 20.3 10 18.7 10 17s-.5-3.3-1.5-4.6M12 23c1.5-1.7 2.5-4.1 2.5-6s-1-4.3-2.5-6M15.5 24.3C17.5 22.3 19 19.3 19 16s-1.5-6.3-3.5-8.3"/>
          </svg>
        </div>
        <div class="card-logo-vertical">world</div>
        <div class="card-brand-text">ness</div>
        <div class="card-wave-texture"></div>
        
        <div class="mastercard-logo">
          <div class="mc-circle red"></div>
          <div class="mc-circle yellow"></div>
        </div>
      </div>
    </div>
  </main>

  <footer class="press-footer">
    <p class="as-seen-in">As Seen In</p>
    <div class="press-logos">
      <div class="press-logo greatist">GREATIST</div>
      <div class="press-logo healthline">healthline</div>
      <div class="press-logo wellgood">WELL+GOOD</div>
      <div class="press-logo fortune">FORTUNE</div>
      <div class="press-logo wsj">WSJ</div>
      <div class="press-logo forbes">Forbes</div>
    </div>
  </footer>

  <div class="magic-particles">
    <!-- Particle generation via JS or simple CSS -->
  </div>

  <script src="main.js"></script>
</body>
</html>
